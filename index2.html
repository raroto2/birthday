    <script>
        // 초기 가상 더미 데이터 구성
        const defaultBirthdays = [
            { id: 1, name: "우리 엄마 ♥", category: "가족", date: "1972-10-25", isLunar: false, note: "선물로 빨간색 꽃다발과 편지 준비하기" },
            { id: 2, name: "김민우 (동호회)", category: "동호회", date: "1994-06-12", isLunar: false, note: "풋살 모임 총무님, 기프티콘 선물" },
            { id: 3, name: "이수진 (회사)", category: "회사", date: "1990-11-05", isLunar: false, note: "커피 메이트, 스타벅스 쿠폰 선물" },
            { id: 4, name: "박지성 (초등)", category: "초등", date: "1997-03-24", isLunar: false, note: "초등 베프, 가벼운 카톡 전송하기" },
            { id: 5, name: "정교수님 🌙", category: "대학", date: "1965-01-15", isLunar: true, note: "대학 지도교수님, 매년 변하는 음력 생신 자동 보정 환산!" }
        ];

        // 브라우저 내부 LocalStorage 연동 및 안전 로드
        let birthdays = JSON.parse(localStorage.getItem('myMobileWebBirthdays'));
        if (!birthdays || birthdays.length === 0) {
            birthdays = defaultBirthdays;
            localStorage.setItem('myMobileWebBirthdays', JSON.stringify(birthdays));
        }

        // 현재 선택된 상세 카테고리 상태값
        let currentCategory = "";

        // 천문연구원 라이브러리를 사용한 음양력 전날 자동 보정 엔진
        function getSolarOfLunar(lunarMonth, lunarDay, year) {
            if (typeof KoreanLunarCalendar === 'undefined') {
                console.warn("KoreanLunarCalendar 라이브러리가 로드되지 않았습니다.");
                return null;
            }
            const calendar = new KoreanLunarCalendar();
            let tempDay = lunarDay;
            let success = false;

            // 입력받은 음력 날짜가 타겟 연도에 실존하지 않는 경우 (예: 윤달이 없거나 30일이 없는 달)
            // 존재하는 가장 가까운 전날까지 순차 차감하며 자동 보정
            while (tempDay > 0) {
                success = calendar.setLunarDate(year, lunarMonth, tempDay, false);
                if (success) {
                    break;
                }
                tempDay--;
            }

            if (success) {
                const res = calendar.getSolarCalendar();
                return {
                    date: new Date(res.year, res.month - 1, res.day),
                    correctedDay: tempDay
                };
            }
            return null;
        }

        function getDDayAndAge(birthDateStr, isLunar) {
            if (!birthDateStr) return { dday: "날짜없음", ageText: "" };

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const parts = birthDateStr.split('-');
            const birthYear = parseInt(parts[0]);
            const month = parseInt(parts[1]);
            const day = parseInt(parts[2]);

            const currentYear = today.getFullYear();
            let bdayThisYear = null;
            let solarDateText = "";

            if (isLunar) {
                // 올해 타겟 음력 날짜 기준 양력 날짜 구하기
                const converted = getSolarOfLunar(month, day, currentYear);
                if (converted) {
                    bdayThisYear = converted.date;
                } else {
                    bdayThisYear = new Date(currentYear, month - 1, day);
                }
                bdayThisYear.setHours(0, 0, 0, 0);

                // 만약 올해 생일이 이미 지나갔다면 내년 음력 날짜 추적
                if (bdayThisYear < today) {
                    const convertedNext = getSolarOfLunar(month, day, currentYear + 1);
                    if (convertedNext) {
                        bdayThisYear = convertedNext.date;
                    } else {
                        bdayThisYear = new Date(currentYear + 1, month - 1, day);
                    }
                    bdayThisYear.setHours(0, 0, 0, 0);
                }

                // 음력에서 변환된 정확한 양력 기준 가이드 정보
                solarDateText = `양력 ${bdayThisYear.getMonth() + 1}월 ${bdayThisYear.getDate()}일`;

            } else {
                // 양력 생일 연산
                bdayThisYear = new Date(currentYear, month - 1, day);
                bdayThisYear.setHours(0, 0, 0, 0);

                if (bdayThisYear < today) {
                    bdayThisYear.setFullYear(currentYear + 1);
                }
            }

            const diffTime = bdayThisYear - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            let ddayText = "";
            let isToday = false;
            if (diffDays === 0 || diffDays === 365) {
                ddayText = "오늘 🎉";
                isToday = true;
            } else {
                ddayText = `D-${diffDays}`;
            }

            // 이번 생일에 올라가게 될 나이 도출
            const targetAge = bdayThisYear.getFullYear() - birthYear;
            const ageText = birthYear ? `올해 ${targetAge}번째 생일` : "";

            return {
                ddayText,
                diffDays: (diffDays === 365) ? 0 : diffDays,
                ageText,
                isToday,
                month,
                day,
                solarDateText
            };
        }

        function showCustomAlert(title, message, iconClass = "fa-circle-info", colorClass = "bg-indigo-100 text-indigo-600") {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBody').innerText = message;
            document.getElementById('modalIcon').className = `w-10 h-10 ${colorClass} rounded-full flex items-center justify-center text-xs mx-auto mb-3`;
            document.getElementById('modalIcon').innerHTML = `<i class="fa-solid ${iconClass}"></i>`;

            const cancelBtn = document.getElementById('modalCancelBtn');
            const confirmBtn = document.getElementById('modalConfirmBtn');

            cancelBtn.classList.add('hidden');
            confirmBtn.className = "flex-1 py-2.5 bg-gradient-to-r from-pink-400 to-amber-400 text-white font-bold rounded-xl text-xs transition shadow-md shadow-pink-100 active:scale-95";
            confirmBtn.innerText = "확인";

            const modal = document.getElementById('customModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('modalContent').classList.remove('scale-95');
                document.getElementById('modalContent').classList.add('scale-100');
            }, 10);

            return new Promise((resolve) => {
                confirmBtn.onclick = function() {
                    closeCustomModal();
                    resolve(true);
                };
            });
        }

        function showCustomConfirm(title, message, iconClass = "fa-triangle-exclamation", colorClass = "bg-amber-100 text-amber-600") {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBody').innerText = message;
            document.getElementById('modalIcon').className = `w-10 h-10 ${colorClass} rounded-full flex items-center justify-center text-xs mx-auto mb-3`;
            document.getElementById('modalIcon').innerHTML = `<i class="fa-solid ${iconClass}"></i>`;

            const cancelBtn = document.getElementById('modalCancelBtn');
            const confirmBtn = document.getElementById('modalConfirmBtn');

            cancelBtn.classList.remove('hidden');
            confirmBtn.className = "flex-1 py-2.5 bg-rose-500 hover:bg-rose-600 text-white font-bold rounded-xl text-xs transition shadow-md shadow-rose-100 active:scale-95";
            confirmBtn.innerText = "삭제하기";

            const modal = document.getElementById('customModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('modalContent').classList.remove('scale-95');
                document.getElementById('modalContent').classList.add('scale-100');
            }, 10);

            return new Promise((resolve) => {
                confirmBtn.onclick = function() {
                    closeCustomModal();
                    resolve(true);
                };
                cancelBtn.onclick = function() {
                    closeCustomModal();
                    resolve(false);
                };
            });
        }

        function closeCustomModal() {
            document.getElementById('modalContent').classList.add('scale-95');
            document.getElementById('modalContent').classList.remove('scale-100');
            setTimeout(() => {
                document.getElementById('customModal').classList.add('hidden');
            }, 150);
        }

        // 토스트 피드백 알림 활성화
        function showToast(message) {
            const toast = document.getElementById('toastMessage');
            document.getElementById('toastText').innerText = message;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 2500);
        }

        // 카테고리 정보 데이터 매핑 및 파스텔톤 컬러 정의
        const categoryMeta = {
            "전체": { icon: "fa-cake-candles", color: "text-pink-500", bg: "bg-pink-50", border: "border-pink-200" },
            "초등": { icon: "fa-school", color: "text-emerald-600", bg: "bg-[#f2fbf2]", border: "border-[#b2f2bb]" },
            "대학": { icon: "fa-graduation-cap", color: "text-purple-600", bg: "bg-[#f8f0fc]", border: "border-[#eebefa]" },
            "회사": { icon: "fa-building", color: "text-blue-600", bg: "bg-[#f0f7ff]", border: "border-[#a5d8ff]" },
            "동호회": { icon: "fa-users-line", color: "text-amber-600", bg: "bg-[#fff9db]", border: "border-[#ffec99]" },
            "취미": { icon: "fa-palette", color: "text-indigo-600", bg: "bg-[#f3f0ff]", border: "border-[#d0bfff]" },
            "가족": { icon: "fa-house-chimney", color: "text-rose-600", bg: "bg-[#fff0f3]", border: "border-[#ffd1dc]" },
            "기타": { icon: "fa-star", color: "text-slate-600", bg: "bg-slate-50", border: "border-slate-200" }
        };

        function renderApp() {
            // 1. 카운트 갱신
            const counts = { "초등": 0, "대학": 0, "회사": 0, "동호회": 0, "취미": 0, "가족": 0, "기타": 0, "전체": birthdays.length };
            birthdays.forEach(b => {
                if (counts[b.category] !== undefined) counts[b.category]++;
            });
            for (const cat in counts) {
                const badge = document.getElementById(`count-${cat}`);
                if (badge) badge.innerText = `${counts[cat]}명`;
            }

            // 2. 가장 임박한 생일 오름차순 가상 맵핑 정렬
            const sortedBdays = [...birthdays].map(b => {
                return { ...b, calc: getDDayAndAge(b.date, b.isLunar) };
            }).sort((a, b) => a.calc.diffDays - b.calc.diffDays);

            // 3. 실시간 TOP 3 생일자 렌더링
            const top3Container = document.getElementById('top3List');
            if (sortedBdays.length === 0) {
                top3Container.innerHTML = `
                    <div class="flex items-center gap-2 py-3 text-slate-500 justify-center">
                        <span class="text-xs font-bold">✨ 소중한 생일들을 먼저 등록해 보세요!</span>
                    </div>
                `;
            } else {
                const top3 = sortedBdays.slice(0, 3);
                top3Container.innerHTML = top3.map((b, idx) => {
                    const meta = categoryMeta[b.category] || categoryMeta["기타"];
                    const lunarBadge = b.isLunar ? '<span class="text-[10px] bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded ml-1 shrink-0 font-bold">음력 🌙</span>' : '';
                    const formattedDate = b.date ? b.date.substring(5).replace('-', '월 ') + '일' : '미정';
                    const solarGuide = b.calc.solarDateText ? `<span class="text-xs text-amber-700 font-semibold block mt-1">${b.calc.solarDateText}</span>` : '';

                    return `
                        <div onclick="openCategory('${b.category}')" class="flex items-center justify-between p-3.5 bg-white/95 hover:bg-white rounded-2xl transition cursor-pointer border border-pink-100/30 shadow-sm">
                            <div class="flex items-center gap-3 min-w-0">
                                <span class="text-xs font-black text-pink-500 w-3 shrink-0">${idx + 1}</span>
                                <div class="w-8.5 h-8.5 ${meta.bg} ${meta.color} rounded-lg flex items-center justify-center text-xs shrink-0">
                                    <i class="fa-solid ${meta.icon}"></i>
                                </div>
                                <div class="min-w-0 leading-tight">
                                    <div class="flex items-center gap-1 flex-wrap">
                                        <h4 class="font-bold text-slate-800 text-sm truncate max-w-[95px]">${b.name}</h4>
                                        ${lunarBadge}
                                    </div>
                                    <p class="text-xs text-slate-500 mt-1 font-medium">${formattedDate} • <span class="text-pink-600 font-bold">${b.calc.ageText || ""}</span></p>
                                    ${solarGuide}
                                </div>
                            </div>
                            <span class="text-xs font-black shrink-0 ${b.calc.isToday ? 'text-pink-600 animate-pulse' : 'text-slate-700'}">${b.calc.ddayText}</span>
                        </div>
                    `;
                }).join('');
            }

            // 4. 활성화된 카테고리가 켜져 있다면 실시간 갱신 적용
            if (currentCategory) {
                renderCategoryDetail(currentCategory);
            }
        }

        function renderCategoryDetail(categoryName) {
            let filtered = [];

            if (categoryName === '전체') {
                filtered = birthdays.map(b => { return { ...b, calc: getDDayAndAge(b.date, b.isLunar) }; })
                    .sort((a, b) => a.calc.diffDays - b.calc.diffDays);
            } else {
                filtered = birthdays.filter(b => b.category === categoryName)
                    .map(b => { return { ...b, calc: getDDayAndAge(b.date, b.isLunar) }; })
                    .sort((a, b) => a.calc.diffDays - b.calc.diffDays);
            }

            const container = document.getElementById('categorySpecificList');
            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 bg-slate-50/50 rounded-2xl border-2 border-dashed border-slate-200 p-5">
                        <span class="text-2xl mb-2 block">🎒</span>
                        <p class="text-xs text-slate-500 font-medium">지정 그룹에 포함된 생일 정보가 없습니다.</p>
                        <button onclick="openAddEditWithCategory('${categoryName === '전체' ? '가족' : categoryName}')" class="mt-3.5 px-4 py-2 bg-pink-400 text-white font-bold rounded-xl text-xs shadow-md shadow-pink-100 hover:opacity-90 transition">
                            첫 멤버 등록하기 +
                        </button>
                    </div>
                `;
            } else {
                container.innerHTML = filtered.map(b => {
                    const meta = categoryMeta[b.category] || categoryMeta["기타"];
                    const formattedDate = b.date ? b.date.substring(5).replace('-', '월 ') + '일' : '미정';
                    const showBadge = categoryName === '전체' ? `<span class="text-[10px] ${meta.bg} ${meta.color} px-2 py-0.5 rounded-full font-bold ml-1 shrink-0">${b.category}</span>` : '';
                    const lunarLabel = b.isLunar ? '<span class="text-[10px] bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded ml-1 shrink-0 font-bold">음력 🌙</span>' : '';
                    
                    const solarLabelText = b.calc.solarDateText ? `<p class="text-xs text-amber-700 font-bold mt-1">${b.calc.solarDateText}</p>` : '';
                    const noteInfo = b.note ? `<p class="text-xs text-slate-600 font-medium mt-1.5 bg-slate-50 p-2.5 rounded-xl border border-slate-200/50 break-all">📌 ${b.note}</p>` : '';

                    return `
                        <div class="p-4 bg-white rounded-2xl border-2 ${meta.border} flex justify-between items-center shadow-sm relative group hover:shadow-md transition">
                            <div class="flex items-start gap-3 flex-grow min-w-0">
                                <div class="w-8.5 h-8.5 ${meta.bg} ${meta.color} rounded-xl flex items-center justify-center text-xs shrink-0 mt-0.5">
                                    <i class="fa-solid ${meta.icon}"></i>
                                </div>
                                <div class="min-w-0 flex-grow leading-tight">
                                    <div class="flex items-center gap-1 flex-wrap">
                                        <h4 class="font-bold text-slate-800 text-sm truncate max-w-[110px]">${b.name}</h4>
                                        ${showBadge}
                                        ${lunarLabel}
                                    </div>
                                    <p class="text-xs text-slate-500 mt-1 font-medium">${formattedDate} • <span class="text-pink-600 font-bold">${b.calc.ageText || "나이 미등록"}</span></p>
                                    ${solarLabelText}
                                    ${noteInfo}
                                </div>
                            </div>
                            
                            <div class="flex items-center gap-1.5 shrink-0 ml-2">
                                <div class="text-right mr-1 select-none">
                                    <span class="text-xs font-black ${b.calc.isToday ? 'text-pink-600 animate-pulse' : 'text-slate-700'}">${b.calc.ddayText}</span>
                                </div>
                                <div class="flex flex-col gap-1">
                                    <button onclick="editBirthday(${b.id})" class="w-7 h-7 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-600 flex items-center justify-center transition">
                                        <i class="fa-solid fa-pen-to-square text-[10px]"></i>
                                    </button>
                                    <button onclick="deleteBirthday(${b.id})" class="w-7 h-7 rounded-lg bg-rose-50 hover:bg-rose-100 text-rose-500 flex items-center justify-center transition">
                                        <i class="fa-solid fa-trash-can text-[10px]"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        function goHome() {
            document.getElementById('screenHome').classList.remove('hidden');
            document.getElementById('screenCategoryDetail').classList.add('hidden');
            document.getElementById('fabAdd').classList.remove('hidden');
            currentCategory = "";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openCategory(categoryName) {
            currentCategory = categoryName;
            document.getElementById('screenHome').classList.add('hidden');
            document.getElementById('screenCategoryDetail').classList.remove('hidden');

            if (categoryName === '전체') {
                document.getElementById('categoryTitle').innerHTML = `전체 목록 <span class="text-pink-500">🌟</span>`;
            } else {
                const meta = categoryMeta[categoryName];
                document.getElementById('categoryTitle').innerHTML = `${categoryName} 친구 <span class="${meta.color}"><i class="fa-solid ${meta.icon} text-sm"></i></span>`;
            }

            renderCategoryDetail(categoryName);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openAddEdit() {
            document.getElementById('editBdayId').value = "";
            document.getElementById('birthdayForm').reset();
            document.getElementById('addEditTitle').innerText = "새 생일 등록하기 🎂";
            setLunar(false);

            document.getElementById('screenHome').classList.add('hidden');
            document.getElementById('screenCategoryDetail').classList.add('hidden');
            document.getElementById('screenAddEdit').classList.remove('hidden');
            document.getElementById('fabAdd').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openAddEditWithCategory(catName) {
            openAddEdit();
            document.getElementById('bdayCategory').value = catName;
        }

        function closeAddEdit() {
            document.getElementById('screenAddEdit').classList.add('hidden');
            document.getElementById('fabAdd').classList.remove('hidden');
            if (currentCategory) {
                document.getElementById('screenCategoryDetail').classList.remove('hidden');
            } else {
                document.getElementById('screenHome').classList.remove('hidden');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 양력/음력 토글 버튼 변경
        function setLunar(isLunar) {
            const btnSolar = document.getElementById('btnSolar');
            const btnLunar = document.getElementById('btnLunar');
            const bdayIsLunar = document.getElementById('bdayIsLunar');

            if (isLunar) {
                btnSolar.className = "flex-1 py-2 text-xs font-bold rounded-lg text-slate-400 hover:text-slate-600 transition";
                btnLunar.className = "flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-sm text-pink-500 transition";
                bdayIsLunar.value = "true";
            } else {
                btnSolar.className = "flex-1 py-2 text-xs font-bold rounded-lg bg-white shadow-sm text-slate-700 transition";
                btnLunar.className = "flex-1 py-2 text-xs font-bold rounded-lg text-slate-400 hover:text-slate-600 transition";
                bdayIsLunar.value = "false";
            }
        }

        document.getElementById('birthdayForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const editId = document.getElementById('editBdayId').value;
            const name = document.getElementById('bdayName').value.trim();
            const category = document.getElementById('bdayCategory').value;
            const date = document.getElementById('bdayDate').value;
            const isLunar = document.getElementById('bdayIsLunar').value === "true";
            const note = document.getElementById('bdayNote').value.trim();

            if (!name || !date) {
                showCustomAlert("정보 확인", "이름과 생년월일을 올바르게 기입해 주세요!", "fa-triangle-exclamation", "bg-amber-100 text-amber-600");
                return;
            }

            if (editId) {
                const idx = birthdays.findIndex(b => b.id == editId);
                if (idx > -1) {
                    birthdays[idx] = { id: parseInt(editId), name, category, date, isLunar, note };
                    showToast("지인 정보가 정상 수정되었습니다 ✨");
                }
            } else {
                const newBday = {
                    id: Date.now(),
                    name,
                    category,
                    date,
                    isLunar,
                    note
                };
                birthdays.push(newBday);
                showToast("소중한 생일이 정상 등록되었습니다 🎉");
            }

            localStorage.setItem('myMobileWebBirthdays', JSON.stringify(birthdays));
            renderApp();
            closeAddEdit();
        });

        // 수정 기능 로딩 트리거
        window.editBirthday = function(id) {
            const target = birthdays.find(b => b.id === id);
            if (!target) return;

            document.getElementById('editBdayId').value = target.id;
            document.getElementById('bdayName').value = target.name;
            document.getElementById('bdayCategory').value = target.category;
            document.getElementById('bdayDate').value = target.date;
            setLunar(target.isLunar);
            document.getElementById('bdayNote').value = target.note || "";

            document.getElementById('addEditTitle').innerText = "생일 정보 수정 ✏️";

            document.getElementById('screenHome').classList.add('hidden');
            document.getElementById('screenCategoryDetail').classList.add('hidden');
            document.getElementById('screenAddEdit').classList.remove('hidden');
            document.getElementById('fabAdd').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // 삭제하기 핸들러
        window.deleteBirthday = async function(id) {
            const target = birthdays.find(b => b.id === id);
            if (!target) return;

            const confirmed = await showCustomConfirm("생일 정보 삭제", `'${target.name}'님의 생일 일정을 영구적으로 삭제할까요?`);
            if (confirmed) {
                birthdays = birthdays.filter(b => b.id !== id);
                localStorage.setItem('myMobileWebBirthdays', JSON.stringify(birthdays));
                showToast("일정이 정상 삭제되었습니다 🗑️");
                renderApp();
            }
        };

        // 초기 작동 실행
        renderApp();
    </script>
</body>
</html>
